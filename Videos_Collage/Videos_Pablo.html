<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Galeria Pablo Esteban</title>
    <link rel="stylesheet" href="../Estilos/Videos/Videos.css" />
</head>
<body>
    <!-- Botón de regresar -->
    <a href="../Paginas/Pablo_Esteban.html" class="back-btn" id="backBtn">← Regresar</a>
    
    <div class="container collage1">
        <!-- El mosaico debe estar FUERA del grid-container para que no se borre -->
        <div id="mosaicoFinal">
            <img src="../IMG/Img_Pablo/Esteban.jpg" alt="Mosaico Final" />
        </div>
        
        <div class="grid-container">
            <!-- Se generará automáticamente por el script -->
        </div>
    </div>

    <!-- Capa de animación inicial -->
    <div id="animOverlay">
        <video id="animVideo" autoplay loop muted playsinline>
            <source src="../IMG/Videos_Pablo/1.mp4" type="video/mp4">
        </video>
        <button id="skipBtn" type="button">Saltar animación</button>
    </div>

    <!-- Modal para reproducir video con sonido -->
    <div id="videoModal" class="video-modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <video id="modalVideo" controls>
                <source src="" type="video/mp4">
            </video>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const videoSources = [
                "../IMG/Videos_Pablo/1.mp4",
                "../IMG/Videos_Pablo/2.mp4",
                "../IMG/Videos_Pablo/3.mp4",
                "../IMG/Videos_Pablo/4.mp4",
                "../IMG/Videos_Pablo/5.mp4",
                "../IMG/Videos_Pablo/6.mp4",
                "../IMG/Videos_Pablo/7.mp4",
                "../IMG/Videos_Pablo/8.mp4",
                "../IMG/Videos_Pablo/9.mp4",
                "../IMG/Videos_Pablo/10.mp4",
                "../IMG/Videos_Pablo/11.mp4",
                "../IMG/Videos_Pablo/12.mp4",
                "../IMG/Videos_Pablo/13.mp4",
                "../IMG/Videos_Pablo/14.mp4",
                "../IMG/Videos_Pablo/15.mp4",
                "../IMG/Videos_Pablo/16.mp4"
            ];

            const overlay = document.getElementById("animOverlay");
            const animVideo = document.getElementById("animVideo");
            const skipBtn = document.getElementById("skipBtn");
            const backBtn = document.getElementById("backBtn");
            const collageContainer = document.querySelector(".container");
            const mosaico = document.getElementById("mosaicoFinal");
            let skipRequested = false;

            collageContainer.style.opacity = "0";

            const targetCount = 16;
            let displayTime = 2500;

            function randomPosition(el) {
                const vw = window.innerWidth;
                const vh = window.innerHeight;
                const w = el.offsetWidth;
                const h = el.offsetHeight;
                const left = Math.random() * (vw - w);
                const top = Math.random() * (vh - h);
                el.style.left = left + "px";
                el.style.top = top + "px";
            }

            function populateCollage() {
                const containerGrid = document.querySelector(".grid-container");
                containerGrid.innerHTML = "";

                for (let i = 1; i <= 16; i++) {
                    const div = document.createElement("div");
                    div.className = `item item${i}`;
                    
                    const video = document.createElement("video");
                    video.src = videoSources[(i - 1) % videoSources.length];
                    video.autoplay = true;
                    video.loop = true;
                    video.muted = true;
                    video.playsInline = true;
                    
                    // Agregar evento click para abrir modal
                    div.addEventListener("click", function() {
                        openVideoModal(videoSources[(i - 1) % videoSources.length]);
                    });
                    
                    div.appendChild(video);
                    containerGrid.appendChild(div);
                }
            }

            // Funciones del modal
            const modal = document.getElementById("videoModal");
            const modalVideo = document.getElementById("modalVideo");
            const closeModal = document.querySelector(".close-modal");
            let mosaicoRevelado = false;

            function openVideoModal(videoSrc) {
                // Detener el mosaico
                if (mosaico) {
                    mosaico.classList.remove("revelado");
                }
                
                // Configurar y mostrar el modal
                modalVideo.src = videoSrc;
                modal.style.display = "flex";
                modalVideo.play();
            }

            function closeVideoModal() {
                modal.style.display = "none";
                modalVideo.pause();
                modalVideo.currentTime = 0;
                
                // Solo volver a mostrar el mosaico si ya pasaron los 5 minutos
                if (mosaico && mosaicoRevelado) {
                    mosaico.classList.add("revelado");
                }
            }

            closeModal.addEventListener("click", closeVideoModal);
            
            // Cerrar modal al hacer click fuera del video
            modal.addEventListener("click", function(e) {
                if (e.target === modal) {
                    closeVideoModal();
                }
            });

            function endAnimation() {
                if (skipRequested) return;
                skipRequested = true;
                
                overlay.style.opacity = "0";

                setTimeout(() => {
                    overlay.style.display = "none";
                    populateCollage();
                    collageContainer.style.transition = "opacity 1.5s ease-in";
                    collageContainer.style.opacity = "1";

                    // REVELAR MOSAICO (5 minutos)
                    setTimeout(() => {
                        if (mosaico) {
                            mosaico.classList.add("revelado");
                            mosaicoRevelado = true;
                        }
                    }, 300000);
                    
                    // Mostrar botón de regresar
                    setTimeout(() => {
                        if (backBtn) {
                            backBtn.classList.add("visible");
                        }
                    }, 2500);
                }, 600);
            }

            skipBtn.addEventListener("click", endAnimation);

            function showVideo(index) {
                if (skipRequested || index >= targetCount) {
                    endAnimation();
                    return;
                }

                animVideo.src = videoSources[index % videoSources.length];
                animVideo.load();
                
                // Esperar a que el video tenga dimensiones antes de posicionar
                animVideo.onloadedmetadata = function() {
                    randomPosition(animVideo);
                    animVideo.play();
                    overlay.classList.add("visible");

                    setTimeout(() => {
                        overlay.classList.remove("visible");
                    }, displayTime - 500);

                    setTimeout(() => {
                        showVideo(index + 1);
                    }, displayTime);
                };
            }

            showVideo(0);
        });
    </script>
</body>
</html>
