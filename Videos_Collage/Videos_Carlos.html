<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Galeria Ana Soledad Lizarazo Calderon</title>
    <link rel="stylesheet" href="../Estilos/Videos/Videos.css" />
</head>
<body>
    <!-- Botón de regresar -->
    <a href="../Paginas/Ana_Soledad.html" class="back-btn" id="backBtn">← Regresar</a>
    
    <div class="container collage1">
        <!-- El mosaico debe estar FUERA del grid-container para que no se borre -->
        <div id="mosaicoFinal">
            <img src="../IMG/Img_Pablo/Esteban.jpg" alt="Mosaico Final" />
        </div>
        
        <div class="grid-container">
            <!-- Se generará automáticamente por el script -->
        </div>
    </div>

    <!-- Capa de animación inicial -->
    <div id="animOverlay">
        <img id="animImg" src="" alt="Recuerdo" />
        <button id="skipBtn" type="button">Saltar animación</button>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const sources = [
                "../IMG/Videos_Ana/1.mp4",
                "../IMG/Img_Pablo/5.jpg",
                "../IMG/Img_Pablo/7.jpg",
                "../IMG/Img_Pablo/9.jpg",
                "../IMG/Img_Pablo/10.jpg",
                "../IMG/Img_Pablo/11.jpg",
                "../IMG/Img_Pablo/12.jpg",
            ];

const overlay = document.getElementById("animOverlay");
            const animImg = document.getElementById("animImg");
            const skipBtn = document.getElementById("skipBtn");
            const backBtn = document.getElementById("backBtn");
            const collageContainer = document.querySelector(".container");
            const mosaico = document.getElementById("mosaicoFinal");
            let skipRequested = false;

            collageContainer.style.opacity = "0";

            const targetCount = 5;
            let displayTime = 2500;

            function randomPosition(el) {
                const vw = window.innerWidth;
                const vh = window.innerHeight;
                const w = el.offsetWidth;
                const h = el.offsetHeight;
                const left = Math.random() * (vw - w);
                const top = Math.random() * (vh - h);
                el.style.left = left + "px";
                el.style.top = top + "px";
            }

            function populateCollage() {
                const containerGrid = document.querySelector(".grid-container");
                containerGrid.innerHTML = ""; // Ahora sí podemos limpiar porque el mosaico está fuera

                for (let i = 1; i <= 5; i++) {
                    const div = document.createElement("div");
                    div.className = `item item${i}`;
                    const img = document.createElement("img");
                    img.src = sources[(i - 1) % sources.length];
                    div.appendChild(img);
                    containerGrid.appendChild(div);
                }
            }

            function endAnimation() {
                if (skipRequested) return;
                skipRequested = true;
                
                overlay.style.opacity = "0";

                setTimeout(() => {
                    overlay.style.display = "none";
                    populateCollage();
                    collageContainer.style.transition = "opacity 1.5s ease-in";
                    collageContainer.style.opacity = "1";

// REVELAR MOSAICO
                    setTimeout(() => {
                        if (mosaico) {
                            mosaico.classList.add("revelado");
                        }
                    }, 10000); 
                    
                    // Mostrar botón de regresar
                    setTimeout(() => {
                        if (backBtn) {
                            backBtn.classList.add("visible");
                        }
                    }, 2500);
                }, 600);
            }

            skipBtn.addEventListener("click", endAnimation);

            function showImage(index) {
                if (skipRequested || index >= targetCount) {
                    endAnimation();
                    return;
                }

                animImg.src = sources[Math.floor(Math.random() * sources.length)];

                animImg.onload = () => {
                    randomPosition(animImg);
                    overlay.classList.add("visible");

                    setTimeout(() => {
                        overlay.classList.remove("visible");
                    }, displayTime - 500);

                    setTimeout(() => {
                        showImage(index + 1);
                    }, displayTime);
                };
            }

            showImage(0);
        });
    </script>
</body>
</html>
